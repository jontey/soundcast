<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundcast - Tenant Admin</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: bold;
      color: white;
      margin: 0px;
    }

    .api-key-section {
      background: #f7fafc;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      border-left: 4px solid #667eea;
    }

    .api-key-input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e2e8f0;
      border-radius: 5px;
      font-size: 14px;
      font-family: monospace;
      margin-top: 10px;
    }

    .section {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 25px;
    }

    .section-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #2d3748;
      border-bottom: 2px solid #667eea;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
    }

    .room-card {
      background: #f7fafc;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid #48bb78;
    }

    .room-card.local {
      border-left-color: #4299e1;
    }

    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .room-name {
      font-size: 18px;
      font-weight: bold;
      color: #2d3748;
    }

    .room-slug {
      font-family: monospace;
      color: #718096;
      font-size: 14px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.local {
      background: #bee3f8;
      color: #2c5282;
    }

    .badge.public {
      background: #c6f6d5;
      color: #22543d;
    }

    .badge.pending {
      background: #fefcbf;
      color: #744210;
    }

    .badge.offline {
      background: #fed7d7;
      color: #742a2a;
    }

    .badge.recording {
      background: #e53e3e;
      color: white;
      animation: pulse 2s infinite;
    }

    .btn.recording-active {
      background: #38a169;
    }

    .btn.recording-active:hover {
      background: #2f855a;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    .room-urls {
      background: white;
      padding: 15px;
      border-radius: 5px;
      margin-top: 15px;
    }

    .url-group {
      margin-bottom: 10px;
    }

    .url-label {
      font-size: 12px;
      font-weight: bold;
      color: #718096;
      margin-bottom: 5px;
    }

    .url-value {
      font-family: monospace;
      font-size: 13px;
      background: #edf2f7;
      padding: 8px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .copy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .copy-btn:hover {
      background: #5568d3;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-danger {
      background: #e53e3e;
      color: white;
    }

    .btn-danger:hover {
      background: #c53030;
    }

    .btn-secondary {
      background: #48bb78;
      color: white;
    }

    .btn-secondary:hover {
      background: #38a169;
    }

    .btn-danger {
      background: #f56565;
      color: white;
    }

    .btn-danger:hover {
      background: #e53e3e;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      color: #2d3748;
    }

    .form-input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e2e8f0;
      border-radius: 5px;
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-checkbox {
      margin-right: 8px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .modal-content {
      background: white;
      max-width: 600px;
      margin: 50px auto;
      padding: 30px;
      border-radius: 10px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #2d3748;
    }

    .close-modal {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: #a0aec0;
    }

    .close-modal:hover {
      color: #2d3748;
    }

    .error {
      background: #fff5f5;
      border-left: 4px solid #f56565;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      color: #742a2a;
    }

    .success {
      background: #f0fff4;
      border-left: 4px solid #48bb78;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      color: #22543d;
    }

    .interpreters-list {
      margin-top: 10px;
    }

    .interpreter-item {
      background: white;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .interpreter-info {
      flex: 1;
    }

    .interpreter-name {
      font-weight: bold;
      color: #2d3748;
    }

    .interpreter-lang {
      font-size: 12px;
      color: #718096;
      text-transform: uppercase;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #718096;
    }

    .publisher-links-section {
      background: white;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      border-left: 3px solid #667eea;
    }

    .publisher-links-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .publisher-links-title {
      font-weight: bold;
      color: #2d3748;
      font-size: 14px;
    }

    .publisher-links-table {
      width: 100%;
      font-size: 13px;
    }

    .publisher-links-table td {
      padding: 8px 5px;
      border-bottom: 1px solid #e2e8f0;
    }

    .publisher-links-table tr:last-child td {
      border-bottom: none;
    }

    .connection-summary {
      font-size: 13px;
      font-weight: bold;
      color: #48bb78;
    }

    .connection-summary.partial {
      color: #ecc94b;
    }

    .connection-summary.offline {
      color: #f56565;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .status-indicator.online {
      color: #48bb78;
    }

    .status-indicator.offline {
      color: #cbd5e0;
    }

    .recording-control {
      background: white;
      padding: 12px;
      border-radius: 6px;
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid #e53e3e;
    }

    .recording-status {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .recording-info {
      font-size: 14px;
      color: #2d3748;
    }

    .settings-row {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .settings-row button {
      font-size: 13px;
      padding: 8px 16px;
    }

    .btn-link {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      padding: 8px 16px;
      font-size: 13px;
      text-decoration: underline;
    }

    .btn-link:hover {
      color: #5568d3;
    }

    .sessions-table {
      width: 100%;
      font-size: 13px;
      margin-top: 10px;
      background: white;
      border-radius: 4px;
      overflow: hidden;
    }

    .sessions-table th {
      background: #edf2f7;
      padding: 8px;
      text-align: left;
      font-weight: bold;
      color: #2d3748;
    }

    .sessions-table td {
      padding: 8px;
      border-top: 1px solid #e2e8f0;
    }

    .form-inline {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .form-inline .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }

    .model-size {
      font-family: monospace;
      font-size: 12px;
      color: #718096;
    }

    .collapsible-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease, margin 0.3s ease;
      padding: 0;
      margin-top: 0;
      border-width: 0;
    }

    .collapsible-content.open {
      max-height: 1000px;
      padding: 15px;
      margin-top: 15px;
      border-width: 3px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Soundcast Admin</h1>
    </div>

    <div id="apiKeySection" class="api-key-section">
      <h3>Tenant Key Configuration</h3>
      <form id="apiKeyForm" onsubmit="loadRooms(event)">
        <input type="text" id="apiKeyInput" class="api-key-input" placeholder="Enter your Tenant key">
        <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Load Rooms</button>
      </form>
    </div>

    <div id="errorMessage" class="error" style="display: none;"></div>
    <div id="successMessage" class="success" style="display: none;"></div>

    <div id="roomsSection" class="section" style="display: none;">
      <div class="section-title">
        <div style="display: flex; align-items: center;">
          Your Rooms
          <span id="wsStatusIndicator"
            style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #f56565; margin-left: 10px;"
            title="Connecting..."></span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <button onclick="loadRooms()" class="btn btn-secondary">Refresh</button>
          <button onclick="showCreateRoomModal()" class="btn btn-primary">+ Create Room</button>
        </div>
      </div>
      <div id="roomsList">
        <div class="loading">Loading rooms...</div>
      </div>
    </div>

  </div>

  <!-- Create Room Modal -->
  <div id="createRoomModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal('createRoomModal')">&times;</span>
      <div class="modal-header">Create New Room</div>
      <form id="createRoomForm" onsubmit="createRoom(event)">
        <div class="form-group">
          <label class="form-label">Room Name</label>
          <input type="text" id="roomName" class="form-input" required placeholder="e.g., Annual Conference 2025">
        </div>
        <div class="form-group">
          <label class="form-label">TURN/STUN Configuration (JSON)</label>
          <textarea id="coturnConfig" class="form-input" rows="5"
            required>[{"urls": "stun:stun.l.google.com:19302"}]</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Create Room</button>
      </form>
    </div>
  </div>

  <!-- Add Publisher Modal -->
  <div id="addPublisherModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal('addPublisherModal')">&times;</span>
      <div class="modal-header">Add Publisher</div>
      <form id="addPublisherForm" onsubmit="addPublisher(event)">
        <input type="hidden" id="publisherRoomSlug">
        <div class="form-group">
          <label class="form-label">Publisher Name</label>
          <input type="text" id="publisherName" class="form-input" required placeholder="e.g., Main Speaker">
        </div>
        <div class="form-group">
          <label class="form-label">Channel Name</label>
          <input type="text" id="publisherChannelName" class="form-input" required
            placeholder="e.g., main, spanish, french">
        </div>
        <div class="form-group">
          <button type="submit" class="btn btn-secondary">Add Publisher</button>
        </div>
      </form>
      <div id="newPublisherTokenDisplay" style="display: none; margin-top: 20px;">
        <div class="success">
          <strong>Publisher Added!</strong><br>
          <strong>Join Token (save this!):</strong><br>
          <code id="newPublisherToken" style="font-size: 16px; user-select: all;"></code><br>
          <strong style="margin-top: 10px; display: block;">Publisher URL:</strong>
          <code id="publisherJoinUrl" style="font-size: 12px; user-select: all; word-break: break-all;"></code><br>
          <button onclick="copyPublisherToken()" class="btn btn-primary" style="margin-top: 10px;">Copy Token</button>
          <button onclick="copyPublisherUrl()" class="btn btn-secondary" style="margin-top: 10px;">Copy URL</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Publisher Modal -->
  <div id="editPublisherModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal('editPublisherModal')">&times;</span>
      <div class="modal-header">Edit Publisher</div>
      <form id="editPublisherForm" onsubmit="editPublisher(event)">
        <input type="hidden" id="editPublisherRoomSlug">
        <input type="hidden" id="editPublisherId">
        <div class="form-group">
          <label class="form-label">Publisher Name</label>
          <input type="text" id="editPublisherName" class="form-input" required placeholder="e.g., Main Speaker">
        </div>
        <div class="form-group">
          <label class="form-label">Channel Name</label>
          <input type="text" id="editPublisherChannelName" class="form-input" required
            placeholder="e.g., main, spanish, french">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>

  <!-- Edit Room Modal -->
  <div id="editRoomModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal('editRoomModal')">&times;</span>
      <div class="modal-header">Edit Room</div>
      <form id="editRoomForm" onsubmit="editRoom(event)">
        <input type="hidden" id="editRoomOriginalSlug">
        <div class="form-group">
          <label class="form-label">Room Name</label>
          <input type="text" id="editRoomName" class="form-input" required placeholder="e.g., Annual Conference 2025">
        </div>
        <div class="form-group">
          <label class="form-label">Room Slug (URL-friendly identifier)</label>
          <input type="text" id="editRoomSlug" class="form-input" required placeholder="e.g., annual-conference-2025"
            pattern="[a-z0-9-]+" title="Only lowercase letters, numbers, and hyphens allowed">
        </div>
        <div class="form-group">
          <label class="form-label">TURN/STUN Configuration (JSON)</label>
          <textarea id="editCoturnConfig" class="form-input" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let currentApiKey = '';
    let adminWs = null;
    let channelStats = {}; // roomSlug -> { channelName: { publishers, subscribers } }
    let recordingStatus = {}; // roomSlug -> { isRecording, startedAt, trackCount, ... }
    let recordingTimers = {}; // roomSlug -> intervalId for duration updates

    // ========== Reactive State Management ==========
    // Lightweight state store with change notifications using Proxy
    const StateStore = {
      _data: {},
      _listeners: {},

      init(initialState) {
        this._data = new Proxy(initialState, {
          set: (target, property, value) => {
            const oldValue = target[property];
            target[property] = value;
            this._notify(property, value, oldValue);
            return true;
          }
        });
        return this._data;
      },

      subscribe(path, callback) {
        if (!this._listeners[path]) {
          this._listeners[path] = [];
        }
        this._listeners[path].push(callback);
        // Return unsubscribe function
        return () => {
          this._listeners[path] = this._listeners[path].filter(cb => cb !== callback);
        };
      },

      _notify(path, newValue, oldValue) {
        if (this._listeners[path]) {
          this._listeners[path].forEach(callback => {
            try {
              callback(newValue, oldValue);
            } catch (err) {
              console.error(`[StateStore] Listener error for ${path}:`, err);
            }
          });
        }
      },

      get(path) {
        return this._data[path];
      },

      set(path, value) {
        this._data[path] = value;
      }
    };

    // Initialize reactive state (backward compatible - wraps existing globals)
    const state = StateStore.init({
      rooms: {},
      channelStats: {},
      recordingStatus: {},
      publishers: {}
    });

    // ========== Helper Utilities ==========
    // Batch DOM updates to reduce reflows
    function batchUpdate(updates) {
      requestAnimationFrame(() => {
        updates.forEach(fn => fn());
      });
    }

    // Smart cache for API responses
    const apiCache = {
      _cache: new Map(),
      _ttl: 5000, // 5 seconds

      async get(key, fetcher) {
        const cached = this._cache.get(key);
        if (cached && Date.now() - cached.timestamp < this._ttl) {
          return cached.data;
        }

        const data = await fetcher();
        this._cache.set(key, { data, timestamp: Date.now() });
        return data;
      },

      invalidate(key) {
        this._cache.delete(key);
      },

      clear() {
        this._cache.clear();
      }
    };

    // Element creation with data attributes
    function createElement(tag, attrs = {}, children = []) {
      const el = document.createElement(tag);

      Object.entries(attrs).forEach(([key, value]) => {
        if (key === 'className') {
          el.className = value;
        } else if (key === 'dataset') {
          Object.assign(el.dataset, value);
        } else if (key.startsWith('on')) {
          el.addEventListener(key.slice(2).toLowerCase(), value);
        } else {
          el.setAttribute(key, value);
        }
      });

      children.forEach(child => {
        if (typeof child === 'string') {
          el.appendChild(document.createTextNode(child));
        } else if (child) {
          el.appendChild(child);
        }
      });

      return el;
    }

    // Helper to update multiple element properties efficiently
    function updateElementsFromTemplate(elements, template) {
      Object.entries(template).forEach(([key, updates]) => {
        const el = elements[key];
        if (!el) return;

        Object.entries(updates).forEach(([prop, value]) => {
          if (prop === 'style') {
            Object.assign(el.style, value);
          } else {
            el[prop] = value;
          }
        });
      });
    }

    // Connect to admin WebSocket for real-time stats
    function connectAdminWebSocket() {
      if (!currentApiKey) return;

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}/ws/admin?apiKey=${encodeURIComponent(currentApiKey)}`;

      console.log('Connecting to admin WebSocket...');
      adminWs = new WebSocket(wsUrl);

      adminWs.onopen = () => {
        console.log('Admin WebSocket connected');
        updateConnectionStatus(true);
      };

      adminWs.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'channel-stats') {
            // Update both old global and new state (backward compatible)
            channelStats = msg.stats;
            state.channelStats = { ...msg.stats };
            updateAllChannelStatsUI();
          } else if (msg.type === 'channel-update') {
            // Update state store (triggers reactivity)
            if (!state.channelStats[msg.roomSlug]) {
              state.channelStats[msg.roomSlug] = {};
            }
            state.channelStats[msg.roomSlug][msg.channelName] = {
              publishers: msg.publishers,
              subscribers: msg.subscribers
            };

            // Also update old global for backward compatibility
            if (!channelStats[msg.roomSlug]) {
              channelStats[msg.roomSlug] = {};
            }
            channelStats[msg.roomSlug][msg.channelName] = {
              publishers: msg.publishers,
              subscribers: msg.subscribers
            };

            // Targeted updates only (no API calls)
            updateChannelStatsForRoomTargeted(msg.roomSlug);
          } else if (msg.type === 'recording-stats') {
            // Initial recording status for all rooms
            recordingStatus = msg.stats;
            state.recordingStatus = { ...msg.stats };
            updateAllRecordingUI();
          } else if (msg.type === 'recording-status') {
            // Recording status update for a specific room
            recordingStatus[msg.roomSlug] = msg;
            state.recordingStatus[msg.roomSlug] = { ...msg };
            updateRecordingUI(msg.roomSlug);
          } else if (msg.type === 'error') {
            console.error('Admin WebSocket error:', msg.data.message);
          }
        } catch (e) {
          console.error('Error parsing WebSocket message:', e);
        }
      };

      adminWs.onclose = () => {
        console.log('Admin WebSocket disconnected, reconnecting in 3s...');
        updateConnectionStatus(false);
        setTimeout(connectAdminWebSocket, 3000);
      };

      adminWs.onerror = (error) => {
        console.error('Admin WebSocket error:', error);
      };
    }

    function updateConnectionStatus(connected) {
      const indicator = document.getElementById('wsStatusIndicator');
      if (indicator) {
        indicator.style.background = connected ? '#48bb78' : '#f56565';
        indicator.title = connected ? 'Real-time updates connected' : 'Reconnecting...';
      }
    }

    function updateAllChannelStatsUI() {
      for (const roomSlug in channelStats) {
        updateChannelStatsForRoom(roomSlug);
      }
    }

    function updateChannelStatsForRoom(roomSlug) {
      // Refresh the publishers and live status table (old way - full reload)
      loadPublishersAndLiveStatus(roomSlug);
    }

    function updateChannelStatsForRoomTargeted(roomSlug) {
      // Targeted update - no API calls, uses cached data
      const publishers = state.publishers[roomSlug];
      const stats = state.channelStats[roomSlug] || {};
      const summaryEl = document.getElementById(`connection-summary-${roomSlug}`);

      if (!publishers || publishers.length === 0) {
        // No cached data, fall back to full load
        loadPublishersAndLiveStatus(roomSlug);
        return;

          summaryEl.textContent = `🟢 All ${activeCount} live`;

          }
        }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeAttr(text) {
      if (!text) return '';
      return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function copyToClipboard(text) {
      // Fallback function using execCommand
      function fallbackCopy() {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.style.position = 'fixed';
        textArea.style.left = '-9999px';
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          showSuccess('Copied to clipboard!');
        } catch (e) {
          showError('Failed to copy to clipboard');
        }
        document.body.removeChild(textArea);
      }

      // Check if clipboard API is available (requires secure context)
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          showSuccess('Copied to clipboard!');
        }).catch(fallbackCopy);
      } else {
        fallbackCopy();
      }
    }

    function getSecureBaseUrl() {
      // Always return HTTPS URL for publisher links (required for microphone access)
      const hostname = window.location.hostname;
      const currentPort = window.location.port;

      // If already on HTTPS, use current host
      if (window.location.protocol === 'https:') {
        return window.location.origin;
      }

      // Port mapping: HTTP -> HTTPS
      const portMap = {
        '3000': '3001',
        '80': '443',
        '': '443'
      };

      const securePort = portMap[currentPort] || '443';
      const portSuffix = securePort === '443' ? '' : `:${securePort}`;

      return `https://${hostname}${portSuffix}`;
    }

          body: JSON.stringify({
            name,
            coturn_config_json: coturnConfig
          })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Failed to create room');
        }

        showSuccess('Room created successfully!');
        closeModal('createRoomModal');
        loadRooms();
      } catch (error) {
        showError(error.message);
      }
    }

    // ============ Recording Functions ============

    // Format duration in HH:MM:SS
    function formatDuration(startedAt) {
      const start = new Date(startedAt);
      const now = new Date();
      const diffMs = now - start;
      const hours = Math.floor(diffMs / 3600000);
      const minutes = Math.floor((diffMs % 3600000) / 60000);
      const seconds = Math.floor((diffMs % 60000) / 1000);
      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    // Toggle recording for a room
    async function toggleRecording(roomSlug) {
      const status = recordingStatus[roomSlug];
      const isRecording = status?.isRecording;
      const endpoint = isRecording ? 'stop' : 'start';

      const btn = document.getElementById(`record-btn-${roomSlug}`);
      btn.disabled = true;
      btn.textContent = isRecording ? 'Stopping...' : 'Starting...';

      try {
        const response = await fetch(`${API_BASE}/rooms/${roomSlug}/recordings/${endpoint}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${currentApiKey}`
          }
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || `Failed to ${endpoint} recording`);
        }

        const result = await response.json();
        showSuccess(result.message);

        // Update local status (WebSocket will also send update)
        recordingStatus[roomSlug] = {
          isRecording: !isRecording,
          ...result
        };
        updateRecordingUI(roomSlug);
      } catch (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = isRecording ? 'Stop' : 'Record';
      }
    }

    // Update recording UI for a specific room
    function updateRecordingUI(roomSlug) {
      const status = recordingStatus[roomSlug];
      const btn = document.getElementById(`record-btn-${roomSlug}`);
      const indicator = document.getElementById(`recording-indicator-${roomSlug}`);
      const duration = document.getElementById(`recording-duration-${roomSlug}`);
      const tracks = document.getElementById(`recording-tracks-${roomSlug}`);

      if (!btn) return;

      btn.disabled = false;

      if (status?.isRecording) {
        btn.textContent = 'Stop';
        btn.classList.add('recording-active');
        indicator.style.display = 'inline';
        duration.style.display = 'inline';
        tracks.style.display = 'inline';
        tracks.textContent = `${status.trackCount || 0} track${status.trackCount !== 1 ? 's' : ''}`;

        // Start duration timer
        if (recordingTimers[roomSlug]) {
          clearInterval(recordingTimers[roomSlug]);
        }
        recordingTimers[roomSlug] = setInterval(() => {
          if (status.startedAt) {
            duration.textContent = formatDuration(status.startedAt);
          }
        }, 1000);
        // Update immediately
        if (status.startedAt) {
          duration.textContent = formatDuration(status.startedAt);
        }
      } else {
        btn.textContent = 'Record';
        btn.classList.remove('recording-active');
        indicator.style.display = 'none';
        duration.style.display = 'none';
        tracks.style.display = 'none';

        // Stop duration timer
        if (recordingTimers[roomSlug]) {
          clearInterval(recordingTimers[roomSlug]);
          delete recordingTimers[roomSlug];
        }
      }
    }

    // Update recording UI for all rooms
    function updateAllRecordingUI() {
      for (const roomSlug in recordingStatus) {
        updateRecordingUI(roomSlug);
      }
    }

    // Close modals on outside click
    window.onclick = function (event) {
      if (event.target.classList.contains('modal')) {
        event.target.style.display = 'none';
      }
    };

    // Check for single-tenant mode and auto-login
    async function checkSingleTenantMode() {
      try {
        const response = await fetch('/api/config');
        const config = await response.json();

        if (config.singleTenant && config.defaultApiKey) {
          // Auto-login with default API key
          currentApiKey = config.defaultApiKey;
          document.getElementById('apiKeyInput').value = config.defaultApiKey;

          // Show a message indicating single-tenant mode
          const apiKeySection = document.getElementById('apiKeySection');
          const singleTenantNotice = document.createElement('div');
          singleTenantNotice.className = 'single-tenant-notice';
          singleTenantNotice.innerHTML = '<strong>Single-Tenant Mode</strong> - Auto-logged in with default API key';
          singleTenantNotice.style.cssText = 'background: #ebf8ff; border: 1px solid #90cdf4; border-radius: 8px; padding: 12px; margin-bottom: 16px; color: #2b6cb0;';
          apiKeySection.insertBefore(singleTenantNotice, apiKeySection.firstChild);

          // Auto-load rooms
          loadRooms();
        }
      } catch (e) {
        console.log('Could not check single-tenant mode:', e);
      }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', checkSingleTenantMode);
  </script>
</body>
