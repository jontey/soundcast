<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundcast - Room Publisher</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 1200px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .publisher-layout {
      display: block;
    }

    .publisher-main,
    .publisher-transcript {
      min-width: 0;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 10px;
    }

    .room-name {
      font-size: 18px;
      color: #718096;
      margin-bottom: 5px;
    }

    .room-slug {
      font-size: 14px;
      color: #a0aec0;
      font-family: monospace;
    }

    .channel-name {
      margin-top: 10px;
      padding: 8px 16px;
      background: #ebf8ff;
      color: #2c5282;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      display: inline-block;
    }

    .listener-count {
      padding: 12px 20px;
      background: #f0fff4;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .listener-count-icon {
      font-size: 20px;
    }

    .listener-count-value {
      font-size: 24px;
      font-weight: bold;
      color: #22543d;
    }

    .listener-count-label {
      font-size: 14px;
      color: #276749;
    }

    .status {
      text-align: center;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .status.disconnected {
      background: #fff5f5;
      color: #c53030;
    }

    .status.connecting {
      background: #fffaf0;
      color: #c05621;
    }

    .status.connected {
      background: #f0fff4;
      color: #22543d;
    }

    .status.broadcasting {
      background: #ebf8ff;
      color: #2c5282;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    .info-box {
      background: #f7fafc;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #4a5568;
    }

    .info-label {
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 5px;
    }

    .info-value {
      font-family: monospace;
      color: #667eea;
      word-break: break-all;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: #48bb78;
      color: white;
    }

    .btn-primary:hover {
      background: #38a169;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(72, 187, 120, 0.3);
    }

    .btn-danger {
      background: #f56565;
      color: white;
    }

    .btn-danger:hover {
      background: #e53e3e;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(245, 101, 101, 0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      background: #fff5f5;
      border-left: 4px solid #f56565;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      color: #742a2a;
      display: none;
    }

    .audio-meter {
      width: 100%;
      height: 40px;
      background: #e2e8f0;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
    }

    .audio-meter-bar {
      height: 100%;
      background: linear-gradient(90deg, #48bb78, #38a169, #2f855a);
      width: 0%;
      transition: width 0.1s;
    }

    .audio-meter-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      font-weight: bold;
      color: #2d3748;
      z-index: 1;
    }

    .audio-source-select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 15px;
      background: white;
    }

    .audio-source-select:focus {
      outline: none;
      border-color: #667eea;
    }

    .audio-option-row {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      color: #2d3748;
    }

    .audio-option-help {
      font-size: 12px;
      color: #718096;
      margin-bottom: 12px;
    }

    /* Recording Indicator */
    .recording-indicator {
      display: none;
      margin-top: 10px;
      padding: 8px 16px;
      background: #fff5f5;
      border-left: 4px solid #f56565;
      border-radius: 8px;
      align-items: center;
      gap: 8px;
    }

    .recording-indicator.active {
      display: flex;
    }

    .recording-badge {
      width: 10px;
      height: 10px;
      background: #f56565;
      border-radius: 50%;
      animation: pulse-red 2s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.6;
        transform: scale(1.1);
      }
    }

    .recording-text {
      font-size: 14px;
      font-weight: 600;
      color: #c53030;
    }

    .transcript-toggle {
      margin-top: 8px;
      width: 100%;
      padding: 10px;
      border: 1px solid #667eea;
      background: #edf2f7;
      color: #2d3748;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .transcript-panel {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      background: #f8fafc;
    }

    .transcript-panel.hidden {
      display: none;
    }

    .transcript-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .transcript-tab {
      border: 1px solid #cbd5e0;
      background: #edf2f7;
      color: #2d3748;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .transcript-tab.active {
      background: #667eea;
      color: #fff;
      border-color: #667eea;
    }

    .transcript-status {
      font-size: 12px;
      color: #4a5568;
      margin-bottom: 6px;
    }

    .transcript-editor {
      width: 100%;
      min-height: 170px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      box-sizing: border-box;
      resize: vertical;
    }

    .chat-box {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      background: #f8fafc;
    }

    .monitor-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }

    .monitor-row button {
      margin: 0;
      width: auto;
      padding: 8px 12px;
      font-size: 13px;
    }

    .chat-row {
      margin-bottom: 6px;
    }

    @media (min-width: 1100px) {
      .publisher-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 20px;
        align-items: start;
      }

      .publisher-transcript .transcript-toggle {
        margin-top: 0;
      }
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title">Publisher</div>
      <div class="room-name" id="roomName">Loading room...</div>
      <div class="channel-name" id="channelName" style="display: none;"></div>
      <div class="recording-indicator" id="recordingIndicator">
        <div class="recording-badge"></div>
        <div class="recording-text">Recording Active</div>
      </div>
    </div>

    <div class="publisher-layout">
      <div class="publisher-main">
        <div id="status" class="status disconnected">
          Connecting to room...
        </div>

        <div class="listener-count" id="listenerCount" style="display: none;">
          <span class="listener-count-icon">&#128266;</span>
          <span class="listener-count-value" id="listenerCountValue">0</span>
          <span class="listener-count-label" id="listenerCountLabel">listeners</span>
        </div>

        <div id="errorMessage" class="error"></div>

        <div id="configInfo" class="info-box" style="display: none;">
          <div class="info-label">SFU Configuration</div>
          <div class="info-value" id="sfuUrl"></div>
        </div>

        <div id="audioSourceContainer" style="display: none;">
          <label class="info-label">Audio Source</label>
          <select id="audioSource" class="audio-source-select">
            <option value="">Select audio source</option>
          </select>
          <label class="audio-option-row">
            <span>Enable Noise suppression (beta)</span>
            <input type="checkbox" id="rnnoiseToggle">
          </label>
          <div class="audio-option-help" id="rnnoiseStatus">
            Noise suppression disabled.
          </div>
        </div>

        <div class="audio-meter" id="audioMeter" style="display: none;">
          <div class="audio-meter-label">Audio Level</div>
          <div class="audio-meter-bar" id="audioMeterBar"></div>
        </div>

        <button id="startBtn" class="btn btn-primary" onclick="startBroadcast()" disabled>
          Start Broadcasting
        </button>
        <button id="stopBtn" class="btn btn-danger" onclick="stopBroadcast(true)" style="display: none;">
          Stop Broadcasting
        </button>

        <div class="chat-box">
          <div class="info-label">Monitor Another Channel</div>
          <select id="monitorChannelSelect" class="audio-source-select">
            <option value="">Select channel to monitor</option>
          </select>
          <div class="monitor-row">
            <button id="startMonitorBtn" class="btn btn-primary" onclick="startMonitorChannel()">Start Monitor</button>
            <button id="stopMonitorBtn" class="btn btn-danger" onclick="stopMonitorChannel()" style="display:none;">Stop Monitor</button>
          </div>
          <audio id="monitorAudioPlayer" autoplay playsinline></audio>
        </div>
      </div>

      <div class="publisher-transcript">
        <button id="toggleTranscriptBtn" class="transcript-toggle" onclick="toggleTranscriptPanel()">
          Show Transcripts
        </button>
        <div id="transcriptPanel" class="transcript-panel hidden">
          <div id="transcriptStatus" class="transcript-status">Transcripts hidden</div>
          <div id="transcriptTabs" class="transcript-tabs"></div>
          <textarea id="transcriptEditor" class="transcript-editor" placeholder="Live transcript will appear here"></textarea>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/bundles/mediasoup-client.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/transcript-sync.js"></script>
  <script src="/js/floating-chat-widget.js"></script>
  <script>
    // Extract room slug from URL path (/room/:slug/publish)
    const pathParts = window.location.pathname.split('/');
    const roomSlug = pathParts[2];

    // Extract publisher token and debug mode from URL query params
    const urlParams = new URLSearchParams(window.location.search);
    const publisherToken = urlParams.get('token');
    const debugMode = urlParams.has('debug');

    if (!roomSlug) {
      showError('Invalid room URL');
      throw new Error('Room slug not found in URL');
    }

    if (!publisherToken) {
      showError('Publisher token required. Please use a valid publisher URL with token.');
      document.getElementById('status').textContent = 'Missing publisher token';
      document.getElementById('status').className = 'status disconnected';
      throw new Error('Publisher token not found in URL');
    }

    document.getElementById('roomName').textContent = `Room: ${roomSlug}`;

    // WebSocket and WebRTC state (prefixed to avoid conflicts with common.js globals)
    let ws = null;           // Room WebSocket (for config)
    let sfuWs = null;        // SFU WebSocket (for WebRTC signaling)
    let pubDevice = null;
    let pubTransport = null;
    let pubProducer = null;
    let pubAudioStream = null;
    let pubRawAudioStream = null;
    let roomConfig = null;
    let pubAudioContext = null;
    let pubAudioMeter = null;
    let pubAudioSource = null;
    let pubMeterUpdateInterval = null;
    let pubDenoiseSource = null;
    let pubDenoiseDestination = null;
    let pubRnnoiseNode = null;
    let pubRnnoiseWorkletLoaded = false;
    let rnnoiseModulePromise = null;
    const rnnoiseAssetBase = '/vendor/web-noise-suppressor';
    let pubSyntheticAudioContext = null;
    let pubSyntheticOscillator = null;
    let transcriptChannels = [];
    let transcriptBinding = null;
    let monitorWs = null;
    let monitorDevice = null;
    let monitorTransport = null;
    let monitorConsumers = [];
    let monitorRtpCapabilities = null;
    let monitorChannel = null;
    let publisherChatWidget = null;

    // Reconnection state
    let roomReconnectAttempts = 0;
    let sfuReconnectAttempts = 0;
    let roomReconnectTimer = null;
    let sfuReconnectTimer = null;
    const pubMaxReconnectAttempts = 50;
    const pubBaseReconnectInterval = 1000;

    // Auto-reconnect broadcasting state
    let wasBroadcasting = false;
    let lastAudioDeviceId = null;

    function getSfuWsUrl() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${protocol}//${window.location.host}/ws`;
    }

    // Status management
    function setStatus(message, className) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = `status ${className}`;
    }

    function isRnnoiseEnabled() {
      return document.getElementById('rnnoiseToggle')?.checked === true;
    }

    function getMicAudioConstraints(audioSourceId) {
      return {
        ...(audioSourceId ? { deviceId: { exact: audioSourceId } } : {}),
        echoCancellation: true,
        noiseSuppression: false,
        autoGainControl: true
      };
    }

    function updateRnnoiseStatus(message) {
      const statusEl = document.getElementById('rnnoiseStatus');
      if (statusEl) {
        statusEl.textContent = message;
      }
    }

    function showError(message) {
      const el = document.getElementById('errorMessage');
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value || '';
      return div.innerHTML;
    }

    async function loadRnnoiseModule() {
      if (rnnoiseModulePromise) {
        return rnnoiseModulePromise;
      }
      rnnoiseModulePromise = import(`${rnnoiseAssetBase}/index.js`);
      return rnnoiseModulePromise;
    }

    function resetDenoiseGraph() {
      if (pubDenoiseSource) {
        try {
          pubDenoiseSource.disconnect();
        } catch (error) {
          console.warn('Failed to disconnect RNNoise source:', error);
        }
      }
      if (pubRnnoiseNode) {
        try {
          pubRnnoiseNode.disconnect();
          pubRnnoiseNode.destroy?.();
        } catch (error) {
          console.warn('Failed to close RNNoise node:', error);
        }
      }
      pubDenoiseSource = null;
      pubDenoiseDestination = null;
      pubRnnoiseNode = null;
    }

    async function applyNoiseSuppression(rawStream) {
      if (!isRnnoiseEnabled()) {
        updateRnnoiseStatus('Noise suppression disabled.');
        resetDenoiseGraph();
        return rawStream;
      }

      if (typeof AudioWorkletNode === 'undefined') {
        const track = rawStream.getAudioTracks()[0];
        if (track) {
          try {
            await track.applyConstraints({ noiseSuppression: true });
          } catch (error) {
            console.warn('Failed to enable browser noise suppression fallback:', error);
          }
        }
        updateRnnoiseStatus('Noise suppression enabled.');
        return rawStream;
      }

      try {
        if (!pubAudioContext || pubAudioContext.state === 'closed') {
          pubAudioContext = new (window.AudioContext || window.webkitAudioContext)();
          pubRnnoiseWorkletLoaded = false;
        }
        if (pubAudioContext.state === 'suspended') {
          await pubAudioContext.resume();
        }

        const { RnnoiseWorkletNode, loadRnnoise } = await loadRnnoiseModule();
        if (!pubRnnoiseWorkletLoaded) {
          await pubAudioContext.audioWorklet.addModule(`${rnnoiseAssetBase}/rnnoise/workletProcessor.js`);
          pubRnnoiseWorkletLoaded = true;
        }

        const wasmBinary = await loadRnnoise({
          url: `${rnnoiseAssetBase}/rnnoise.wasm`,
          simdUrl: `${rnnoiseAssetBase}/rnnoise_simd.wasm`
        });

        resetDenoiseGraph();
        pubDenoiseSource = pubAudioContext.createMediaStreamSource(rawStream);
        pubRnnoiseNode = new RnnoiseWorkletNode(pubAudioContext, {
          wasmBinary,
          maxChannels: 1
        });
        pubDenoiseDestination = pubAudioContext.createMediaStreamDestination();
        pubDenoiseSource.connect(pubRnnoiseNode);
        pubRnnoiseNode.connect(pubDenoiseDestination);

        updateRnnoiseStatus('Noise suppression enabled.');
        return pubDenoiseDestination.stream;
      } catch (error) {
        console.warn('RNNoise initialization failed. Falling back to browser suppression.', error);
        const track = rawStream.getAudioTracks()[0];
        if (track) {
          try {
            await track.applyConstraints({ noiseSuppression: true });
          } catch (applyError) {
            console.warn('Failed to enable browser noise suppression fallback:', applyError);
          }
        }
        updateRnnoiseStatus('Noise suppression enabled.');
        resetDenoiseGraph();
        return rawStream;
      }
    }

    async function waitForTranscriptLib(timeoutMs = 10000) {
      const start = Date.now();
      while (!window.SoundcastTranscript) {
        if (Date.now() - start > timeoutMs) {
          throw new Error('Transcript library failed to load');
        }
        await new Promise(resolve => setTimeout(resolve, 100));
      }
    }

    function setTranscriptStatus(message) {
      const statusEl = document.getElementById('transcriptStatus');
      if (statusEl) statusEl.textContent = message;
    }

    function destroyTranscriptBinding() {
      if (!transcriptBinding) return;
      try {
        transcriptBinding.destroy();
      } catch (error) {
        console.warn('Failed to destroy transcript binding:', error);
      }
      transcriptBinding = null;
    }

    function renderTranscriptTabs(activeChannel) {
      const tabsEl = document.getElementById('transcriptTabs');
      if (!tabsEl) return;
      tabsEl.innerHTML = transcriptChannels.map(channel => {
        const active = channel === activeChannel ? 'active' : '';
        const encoded = encodeURIComponent(channel);
        return `<button class="transcript-tab ${active}" onclick="openTranscriptChannel(decodeURIComponent('${encoded}'))">${escapeHtml(channel)}</button>`;
      }).join('');
    }

    async function openTranscriptChannel(channelName) {
      if (!channelName) return;
      const editor = document.getElementById('transcriptEditor');
      if (!editor) return;

      destroyTranscriptBinding();
      renderTranscriptTabs(channelName);
      editor.value = '';
      editor.placeholder = `Connecting to ${channelName}...`;

      try {
        await waitForTranscriptLib();
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/transcripts/${encodeURIComponent(roomSlug)}/${encodeURIComponent(channelName)}?token=${encodeURIComponent(publisherToken)}`;
        transcriptBinding = await window.SoundcastTranscript.createBinding({
          wsUrl,
          textarea: editor,
          onStatus: (status, message) => {
            if (status === 'connected') {
              setTranscriptStatus(`Channel: ${channelName} (live sync)`);
            } else if (status === 'disconnected') {
              setTranscriptStatus(`Channel: ${channelName} (disconnected)`);
            } else if (status === 'error') {
              setTranscriptStatus(message || `Channel: ${channelName} (error)`);
            }
          }
        });
      } catch (error) {
        setTranscriptStatus(`Failed to connect transcript: ${error.message}`);
      }
    }

    async function toggleTranscriptPanel() {
      const panel = document.getElementById('transcriptPanel');
      const btn = document.getElementById('toggleTranscriptBtn');
      const hidden = panel.classList.contains('hidden');

      if (!hidden) {
        panel.classList.add('hidden');
        btn.textContent = 'Show Transcripts';
        setTranscriptStatus('Transcripts hidden');
        destroyTranscriptBinding();
        return;
      }

      panel.classList.remove('hidden');
      btn.textContent = 'Hide Transcripts';

      if (!transcriptChannels.length) {
        setTranscriptStatus('No channels available for transcript view');
        document.getElementById('transcriptTabs').innerHTML = '';
        return;
      }

      setTranscriptStatus('Connecting transcript sync...');
      await openTranscriptChannel(transcriptChannels[0]);
    }

    // Update listener count display
    function updateListenerCount(count) {
      const countEl = document.getElementById('listenerCount');
      const valueEl = document.getElementById('listenerCountValue');
      const labelEl = document.getElementById('listenerCountLabel');

      valueEl.textContent = count;
      labelEl.textContent = count === 1 ? 'listener' : 'listeners';
      countEl.style.display = 'flex';
    }

    // Attempt to reconnect to room WebSocket
    function attemptRoomReconnect() {
      if (roomReconnectTimer) {
        clearTimeout(roomReconnectTimer);
        roomReconnectTimer = null;
      }

      if (roomReconnectAttempts >= pubMaxReconnectAttempts) {
        setStatus('Failed to reconnect to room', 'disconnected');
        return;
      }

      roomReconnectAttempts++;
      const delay = Math.min(pubBaseReconnectInterval * Math.pow(1.5, roomReconnectAttempts - 1), 30000);

      setStatus(`Reconnecting to room in ${Math.round(delay / 1000)}s... (${roomReconnectAttempts}/${pubMaxReconnectAttempts})`, 'connecting');

      roomReconnectTimer = setTimeout(() => {
        connectToRoom();
      }, delay);
    }

    // Attempt to reconnect to SFU WebSocket
    function attemptSfuReconnect() {
      if (sfuReconnectTimer) {
        clearTimeout(sfuReconnectTimer);
        sfuReconnectTimer = null;
      }

      if (sfuReconnectAttempts >= pubMaxReconnectAttempts) {
        setStatus('Failed to reconnect to SFU', 'disconnected');
        return;
      }

      sfuReconnectAttempts++;
      const delay = Math.min(pubBaseReconnectInterval * Math.pow(1.5, sfuReconnectAttempts - 1), 30000);

      setStatus(`Reconnecting to SFU in ${Math.round(delay / 1000)}s... (${sfuReconnectAttempts}/${pubMaxReconnectAttempts})`, 'connecting');

      sfuReconnectTimer = setTimeout(() => {
        connectToSfu();
      }, delay);
    }

    // Load audio input devices
    async function loadAudioInputDevices() {
      try {
        // Request microphone permission first to get labeled devices
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          stream.getTracks().forEach(track => track.stop());
        } catch (permissionError) {
          console.warn('Could not get microphone permission:', permissionError);
        }

        const devices = await navigator.mediaDevices.enumerateDevices();
        const audioInputs = devices.filter(device => device.kind === 'audioinput');

        const audioSourceSelect = document.getElementById('audioSource');
        audioSourceSelect.innerHTML = '<option value="">Select audio source</option>';

        audioInputs.forEach(device => {
          const option = document.createElement('option');
          option.value = device.deviceId;
          option.text = device.label || `Microphone ${audioSourceSelect.length}`;
          audioSourceSelect.appendChild(option);
        });

        // Auto-select the first device if available
        if (audioInputs.length > 0 && audioSourceSelect.options.length > 1) {
          audioSourceSelect.selectedIndex = 1;
        }

        document.getElementById('audioSourceContainer').style.display = 'block';

        // Add change listener for switching microphone during broadcast
        audioSourceSelect.addEventListener('change', handleAudioSourceChange);

        const rnnoiseToggle = document.getElementById('rnnoiseToggle');
        if (rnnoiseToggle && !rnnoiseToggle.dataset.listenerAttached) {
          rnnoiseToggle.addEventListener('change', async () => {
            if (pubProducer) {
              const audioSourceSelect = document.getElementById('audioSource');
              const selectedDeviceId = audioSourceSelect ? audioSourceSelect.value : '';
              await restartMicrophoneCapture(selectedDeviceId, 'Applying RNNoise setting...');
            }
            updateRnnoiseStatus(
              rnnoiseToggle.checked
                ? 'Noise suppression enabled.'
                : 'Noise suppression disabled.'
            );
          });
          rnnoiseToggle.dataset.listenerAttached = 'true';
        }
      } catch (error) {
        console.error('Error loading audio devices:', error);
        showError('Error loading audio devices: ' + error.message);
      }
    }

    // Recreate microphone stream + producer with current settings/device
    async function restartMicrophoneCapture(deviceId, connectingStatus = 'Switching microphone...') {
      setStatus(connectingStatus, 'connecting');

      // Close the existing producer first
      if (pubProducer) {
        pubProducer.close();
        pubProducer = null;
      }

      // Disconnect old audio source from meter
      if (pubAudioSource) {
        try {
          pubAudioSource.disconnect();
        } catch (e) {
          console.warn('Error disconnecting old audio source:', e);
        }
        pubAudioSource = null;
      }

      // Stop old audio tracks BEFORE getting new stream
      // This ensures the old microphone is fully released
      if (pubAudioStream) {
        pubAudioStream.getTracks().forEach(track => {
          track.stop();
          console.log('Stopped old track:', track.label);
        });
        pubAudioStream = null;
      }
      if (pubRawAudioStream) {
        pubRawAudioStream.getTracks().forEach(track => track.stop());
        pubRawAudioStream = null;
      }
      resetDenoiseGraph();

      // Small delay to allow OS to release the microphone
      await new Promise(resolve => setTimeout(resolve, 100));

      // Get stream from selected device
      const newStream = await navigator.mediaDevices.getUserMedia({ audio: getMicAudioConstraints(deviceId || undefined) });
      pubRawAudioStream = newStream;
      const processedStream = await applyNoiseSuppression(newStream);
      const newTrack = processedStream.getAudioTracks()[0];
      console.log('New track obtained:', newTrack.label);

      pubAudioStream = processedStream;

      // Update audio meter with new source
      if (pubAudioContext && pubAudioMeter) {
        pubAudioSource = pubAudioContext.createMediaStreamSource(processedStream);
        pubAudioSource.connect(pubAudioMeter);
      }

      // Create new producer with new track
      pubProducer = await pubTransport.produce({ track: newTrack });
    }

    // Handle audio source change during broadcast
    async function handleAudioSourceChange(e) {
      const newDeviceId = e.target.value;

      // If not broadcasting, just note the selection
      if (!pubProducer || !newDeviceId) {
        return;
      }

      console.log('Switching microphone to:', newDeviceId);

      try {
        await restartMicrophoneCapture(newDeviceId, 'Switching microphone...');

        console.log('Microphone switched successfully - new producer created');
        setStatus('Broadcasting', 'broadcasting');
      } catch (error) {
        console.error('Error switching microphone:', error);
        showError('Failed to switch microphone: ' + error.message);
        setStatus('Broadcasting', 'broadcasting');
      }
    }

    // Connect to room WebSocket (for configuration)
    function connectToRoom() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws/room/${roomSlug}/publish?token=${publisherToken}`;

      setStatus('Connecting to room...', 'connecting');
      console.log('Connecting to:', wsUrl);

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log('Room WebSocket connected');
        roomReconnectAttempts = 0; // Reset on successful connection
        setStatus('Connected, waiting for configuration...', 'connected');
        // Request config after handlers are ready (fixes iOS Safari timing issue)
        ws.send(JSON.stringify({ type: 'get-config' }));
      };

      ws.onmessage = async (event) => {
        try {
          const message = JSON.parse(event.data);
          console.log('Received room message:', message);

          if (message.type === 'config') {
            handleRoomConfig(message.data);
          } else if (message.type === 'error') {
            showError(message.data.message);
            setStatus('Error: ' + message.data.message, 'disconnected');
          } else if (message.type === 'recording-status') {
            handleRecordingStatus(message);
          } else if (message.type === 'publisher-chat-message') {
            appendPublisherChat(message.data);
          } else if (message.type === 'publisher-chat-history') {
            const messages = Array.isArray(message?.data?.messages) ? message.data.messages : [];
            renderPublisherChat(messages);
          }
        } catch (error) {
          console.error('Error handling message:', error);
          showError('Failed to handle server message');
        }
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        showError('WebSocket connection error');
        setStatus('Connection error', 'disconnected');
      };

      ws.onclose = () => {
        console.log('Room WebSocket closed');
        document.getElementById('startBtn').disabled = true;
        attemptRoomReconnect();
      };
    }

    // Handle room configuration from server
    async function handleRoomConfig(config) {
      console.log('Room config received:', config);
      roomConfig = config;
      transcriptChannels = Array.isArray(config.channels) ? config.channels : [];
      if (transcriptChannels.length === 0 && config.channelName) {
        transcriptChannels = [config.channelName];
      }
      renderTranscriptTabs(transcriptChannels[0] || null);
      populateMonitorChannels(transcriptChannels);

      // Display channel name
      if (config.channelName) {
        const channelEl = document.getElementById('channelName');
        channelEl.textContent = `Channel: ${config.channelName}`;
        channelEl.style.display = 'inline-block';
      }

      // Display config info (only in debug mode)
      if (debugMode) {
        document.getElementById('sfuUrl').textContent = getSfuWsUrl();
        document.getElementById('configInfo').style.display = 'block';
      }

      // Load audio devices in background so SFU connect is never blocked.
      loadAudioInputDevices().catch((err) => {
        console.warn('Audio device discovery failed:', err);
      });

      // Show recording indicator if recording is active
      if (config.isRecording) {
        handleRecordingStatus({
          isRecording: true,
          transcriptionActive: Boolean(config.transcriptionActive),
          eventName: config.eventName || null
        });
      }

      // Connect to SFU
      connectToSfu();
      ws.send(JSON.stringify({ type: 'publisher-chat-history-request' }));
    }

    function populateMonitorChannels(channels) {
      const selectEl = document.getElementById('monitorChannelSelect');
      selectEl.innerHTML = '<option value="">Select channel to monitor</option>';
      channels.forEach((channelName) => {
        const option = document.createElement('option');
        option.value = channelName;
        option.textContent = channelName;
        selectEl.appendChild(option);
      });
    }

    function formatChatTimestamp(ts) {
      try {
        return new Date(ts).toLocaleTimeString();
      } catch {
        return '';
      }
    }

    function renderPublisherChat(messages) {
      if (!publisherChatWidget) return;
      publisherChatWidget.setMessages(Array.isArray(messages) ? messages : [], 'No messages yet.');
    }

    function appendPublisherChat(message) {
      if (!publisherChatWidget || !message || !message.text) return;
      publisherChatWidget.appendMessage(message);
    }

    function sendPublisherChat(text) {
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return false;
      ws.send(JSON.stringify({
        type: 'publisher-chat-send',
        data: { text }
      }));
      return true;
    }

    // Handle recording status updates
    function handleRecordingStatus(statusPayload) {
      const indicator = document.getElementById('recordingIndicator');
      const textEl = indicator.querySelector('.recording-text');
      const isRecording = Boolean(statusPayload?.isRecording);
      if (isRecording) {
        const eventLabel = statusPayload?.eventName ? ` | ${statusPayload.eventName}` : '';
        const transcriptionLabel = statusPayload?.transcriptionActive ? ' | transcription on' : '';
        textEl.textContent = `Recording Active${transcriptionLabel}${eventLabel}`;
        indicator.classList.add('active');
      } else {
        textEl.textContent = 'Recording Active';
        indicator.classList.remove('active');
      }
    }

    // Connect to SFU WebSocket
    function connectToSfu() {
      const sfuUrl = getSfuWsUrl();
      console.log('Connecting to SFU:', sfuUrl);
      setStatus('Connecting to SFU...', 'connecting');

      sfuWs = new WebSocket(sfuUrl);

      sfuWs.onopen = () => {
        console.log('SFU WebSocket connected');
        sfuReconnectAttempts = 0; // Reset on successful connection
        // Request RTP capabilities
        sfuWs.send(JSON.stringify({ action: 'get-rtpCapabilities' }));
      };

      sfuWs.onmessage = handleSfuMessage;

      sfuWs.onerror = (error) => {
        console.error('SFU WebSocket error:', error);
        showError('Failed to connect to SFU');
        setStatus('SFU connection error', 'disconnected');
      };

      sfuWs.onclose = () => {
        console.log('SFU WebSocket closed');
        if (pubProducer) {
          stopBroadcast();
        }
        attemptSfuReconnect();
      };
    }

    // Handle SFU messages
    async function handleSfuMessage(event) {
      let data;
      try {
        data = JSON.parse(event.data);
      } catch (e) {
        console.error('Error parsing SFU message:', e);
        return;
      }

      const { action, data: payload } = data;
      console.log('SFU message:', action, payload);

      switch (action) {
        case 'rtpCapabilities':
          rtpCapabilities = payload;
          setStatus('Ready to broadcast', 'connected');
          document.getElementById('startBtn').disabled = false;

          // Auto-resume broadcasting if we were broadcasting before disconnection
          if (wasBroadcasting && lastAudioDeviceId) {
            console.log('Auto-resuming broadcasting after reconnection');
            setStatus('Resuming broadcast...', 'connecting');
            // Small delay to ensure UI updates
            setTimeout(() => {
              // Ensure the audio source is selected
              document.getElementById('audioSource').value = lastAudioDeviceId;
              startBroadcast();
            }, 100);
          }
          break;

        case 'publisher-transport-created':
          await handleTransportCreated(payload);
          break;

        case 'publisher-transport-connected':
          console.log('Transport connected successfully');
          break;

        case 'produced':
          console.log('Producer created:', payload.id);
          setStatus('Broadcasting', 'broadcasting');
          wasBroadcasting = true; // Track that we're actively broadcasting
          break;

        case 'error':
          showError(payload.message);
          setStatus('Error: ' + payload.message, 'disconnected');
          break;

        case 'channel-list':
          // Informational: list of active channels on the SFU
          console.log('Active channels:', payload);
          break;

        case 'broadcasting-stopped':
          // Another publisher stopped broadcasting on this channel
          console.log('Broadcasting stopped on channel:', payload.channelId);
          break;

        case 'listener-count':
          // Update listener count display
          updateListenerCount(payload.count);
          break;

        default:
          console.log('Unknown SFU action:', action);
      }
    }

    function connectMonitorWs() {
      if (monitorWs && monitorWs.readyState === WebSocket.OPEN) return;
      const sfuUrl = getSfuWsUrl();
      monitorWs = new WebSocket(sfuUrl);
      monitorWs.onopen = () => {
        monitorWs.send(JSON.stringify({ action: 'get-rtpCapabilities' }));
      };
      monitorWs.onmessage = async (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          return;
        }
        const { action, data: payload } = data;
        if (action === 'rtpCapabilities') {
          monitorRtpCapabilities = payload;
          await joinMonitorChannel();
        } else if (action === 'listener-transport-created') {
          await handleMonitorTransport(payload);
        } else if (action === 'consumer-created') {
          await handleMonitorConsumer(payload);
        }
      };
    }

    async function startMonitorChannel() {
      const selected = document.getElementById('monitorChannelSelect').value;
      if (!selected) {
        showError('Select a monitor channel first');
        return;
      }
      if (monitorChannel === selected && monitorTransport) return;
      stopMonitorChannel();
      monitorChannel = selected;
      connectMonitorWs();
      document.getElementById('startMonitorBtn').style.display = 'none';
      document.getElementById('stopMonitorBtn').style.display = 'inline-block';
    }

    async function joinMonitorChannel() {
      if (!monitorChannel || !monitorWs || monitorWs.readyState !== WebSocket.OPEN) return;
      monitorDevice = new mediasoupClient.Device();
      await monitorDevice.load({ routerRtpCapabilities: monitorRtpCapabilities });
      monitorWs.send(JSON.stringify({
        action: 'create-listener-transport',
        data: {
          channelId: `${roomSlug}:${monitorChannel}`,
          displayName: 'Publisher monitor'
        }
      }));
    }

    async function handleMonitorTransport(transportParams) {
      const iceServers = getIceServersFromConfig(roomConfig);
      transportParams.iceServers = iceServers;
      monitorTransport = monitorDevice.createRecvTransport(transportParams);
      monitorTransport.on('connect', ({ dtlsParameters }, callback, errback) => {
        try {
          monitorWs.send(JSON.stringify({
            action: 'connect-listener-transport',
            data: { dtlsParameters }
          }));
          callback();
        } catch (error) {
          errback(error);
        }
      });
      monitorWs.send(JSON.stringify({
        action: 'consume-audio',
        data: { rtpCapabilities: monitorDevice.rtpCapabilities }
      }));
    }

    async function handleMonitorConsumer(payload) {
      const entries = Array.isArray(payload) ? payload : [payload];
      const stream = new MediaStream();
      for (const item of entries) {
        const consumer = await monitorTransport.consume({
          id: item.id,
          producerId: item.producerId,
          kind: item.kind,
          rtpParameters: item.rtpParameters
        });
        monitorConsumers.push(consumer);
        stream.addTrack(consumer.track);
      }
      document.getElementById('monitorAudioPlayer').srcObject = stream;
    }

    function stopMonitorChannel() {
      if (monitorWs && monitorWs.readyState === WebSocket.OPEN) {
        monitorWs.send(JSON.stringify({ action: 'leave-channel', data: {} }));
      }
      monitorConsumers.forEach((consumer) => {
        try { consumer.close(); } catch { }
      });
      monitorConsumers = [];
      if (monitorTransport) {
        try { monitorTransport.close(); } catch { }
      }
      monitorTransport = null;
      monitorDevice = null;
      monitorChannel = null;
      document.getElementById('monitorAudioPlayer').srcObject = null;
      document.getElementById('startMonitorBtn').style.display = 'inline-block';
      document.getElementById('stopMonitorBtn').style.display = 'none';
    }

    // Handle transport created
    async function handleTransportCreated(transportParams) {
      try {
        // Create send transport with dynamic ICE servers from room config
        const iceServers = getIceServersFromConfig(roomConfig);
        console.log('ICE servers being used:', JSON.stringify(iceServers, null, 2));

        // Pass iceServers both directly and via additionalSettings for compatibility
        transportParams.iceServers = iceServers;
        transportParams.additionalSettings = {
          ...transportParams.additionalSettings,
          iceServers: iceServers
        };

        pubTransport = pubDevice.createSendTransport(transportParams);

        // Set up transport events
        pubTransport.on('connect', async ({ dtlsParameters }, callback, errback) => {
          try {
            sfuWs.send(JSON.stringify({
              action: 'connect-publisher-transport',
              data: { dtlsParameters }
            }));
            callback();
          } catch (error) {
            errback(error);
          }
        });

        pubTransport.on('produce', async ({ kind, rtpParameters }, callback, errback) => {
          try {
            sfuWs.send(JSON.stringify({
              action: 'produce-audio',
              data: {
                channelId: `${roomSlug}:${roomConfig.channelName}`,
                rtpParameters
              }
            }));
            callback({ id: 'temp-producer-id' });
          } catch (error) {
            errback(error);
          }
        });

        pubTransport.on('connectionstatechange', (state) => {
          console.log('Transport connection state:', state);
          if (state === 'failed' || state === 'closed') {
            stopBroadcast();
          }
        });

        // Start producing audio
        await produceAudio();
      } catch (error) {
        console.error('Error handling transport:', error);
        showError('Error setting up transport: ' + error.message);
        stopBroadcast(true); // Failed during setup, clear reconnect state
      }
    }

    // Produce audio
    async function produceAudio() {
      try {
        if (!pubTransport || !pubAudioStream) {
          throw new Error('Transport or audio stream not ready');
        }

        const track = pubAudioStream.getAudioTracks()[0];
        pubProducer = await pubTransport.produce({ track });

        console.log('Producer created');
      } catch (error) {
        console.error('Error producing audio:', error);
        showError('Error producing audio: ' + error.message);
        stopBroadcast(true); // Failed during setup, clear reconnect state
      }
    }

    // Start broadcasting
    async function startBroadcast() {
      const audioSourceId = document.getElementById('audioSource').value;

      try {
        const withTimeout = async (promise, ms, label) => {
          const timeout = new Promise((_, reject) =>
            setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms)
          );
          return Promise.race([promise, timeout]);
        };

        setStatus('Requesting microphone access...', 'connecting');

        // Save audio device ID for auto-reconnect
        lastAudioDeviceId = audioSourceId || null;

        // Get microphone access (use selected device when available)
        const micRequest = navigator.mediaDevices.getUserMedia({
          audio: getMicAudioConstraints(audioSourceId)
        });
        const micTimeout = new Promise((_, reject) =>
          setTimeout(() => reject(new Error('Microphone request timed out')), 5000)
        );

        try {
          pubRawAudioStream = await Promise.race([micRequest, micTimeout]);
          pubAudioStream = await applyNoiseSuppression(pubRawAudioStream);
        } catch (micErr) {
          console.warn('Using synthetic fallback audio stream:', micErr.message);
          if (pubSyntheticAudioContext && pubSyntheticAudioContext.state !== 'closed') {
            await pubSyntheticAudioContext.close();
          }
          pubSyntheticAudioContext = new (window.AudioContext || window.webkitAudioContext)();
          const destination = pubSyntheticAudioContext.createMediaStreamDestination();
          pubSyntheticOscillator = pubSyntheticAudioContext.createOscillator();
          pubSyntheticOscillator.frequency.value = 440;
          pubSyntheticOscillator.connect(destination);
          pubSyntheticOscillator.start();
          pubRawAudioStream = destination.stream;
          pubAudioStream = destination.stream;
        }

        console.log('Microphone access granted');

        // Initialize audio meter (best-effort; broadcast continues even if this fails).
        try {
          if (!pubAudioContext || pubAudioContext.state === 'closed') {
            pubAudioContext = new (window.AudioContext || window.webkitAudioContext)();
          }

          if (pubAudioContext.state === 'suspended') {
            await pubAudioContext.resume();
          }

          if (pubAudioSource) {
            try {
              pubAudioSource.disconnect();
            } catch (e) {
              console.warn('Error disconnecting old audio source:', e);
            }
            pubAudioSource = null;
          }

          if (pubAudioMeter) {
            pubAudioMeter.shutdown();
            pubAudioMeter = null;
          }

          pubAudioSource = pubAudioContext.createMediaStreamSource(pubAudioStream);
          pubAudioMeter = createAudioMeter(pubAudioContext);
          pubAudioSource.connect(pubAudioMeter);

          if (pubMeterUpdateInterval) {
            clearInterval(pubMeterUpdateInterval);
            pubMeterUpdateInterval = null;
          }
          pubMeterUpdateInterval = setInterval(() => {
            updateAudioMeter(pubAudioMeter, document.getElementById('audioMeterBar'));
          }, 100);
        } catch (meterError) {
          console.warn('Audio meter initialization failed:', meterError);
        }

        // Create mediasoup device
        pubDevice = new mediasoupClient.Device();
        await withTimeout(
          pubDevice.load({ routerRtpCapabilities: rtpCapabilities }),
          10000,
          'mediasoup device load'
        );

        // Request transport from SFU
        setStatus('Creating transport...', 'connecting');
        sfuWs.send(JSON.stringify({
          action: 'create-publisher-transport',
          data: {
            channelId: `${roomSlug}:${roomConfig.channelName}`,
            publisherId: roomConfig.publisherId || null
          }
        }));

        // Update UI
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('audioMeter').style.display = 'block';

      } catch (error) {
        console.error('Error starting broadcast:', error);
        showError('Failed to start broadcast: ' + error.message);
        setStatus('Ready to broadcast', 'connected');
        stopBroadcast(true); // Failed to start, clear reconnect state
      }
    }

    // Stop broadcasting
    // @param {boolean} intentional - If true, user clicked stop button. If false/undefined, it's a disconnection.
    function stopBroadcast(intentional = false) {
      // If intentionally stopped, clear auto-reconnect state
      if (intentional) {
        wasBroadcasting = false;
        lastAudioDeviceId = null;
      }
      // If disconnection (not intentional), keep wasBroadcasting = true for auto-reconnect

      // Notify SFU about stopping
      if (sfuWs && sfuWs.readyState === WebSocket.OPEN && roomConfig) {
        sfuWs.send(JSON.stringify({
          action: 'stop-broadcasting',
          data: { channelId: `${roomSlug}:${roomConfig.channelName}` }
        }));
      }

      // Stop producer
      if (pubProducer) {
        pubProducer.close();
        pubProducer = null;
      }

      // Close transport
      if (pubTransport) {
        pubTransport.close();
        pubTransport = null;
      }

      // Stop audio stream
      if (pubAudioStream) {
        pubAudioStream.getTracks().forEach(track => track.stop());
        pubAudioStream = null;
      }
      if (pubRawAudioStream) {
        pubRawAudioStream.getTracks().forEach(track => track.stop());
        pubRawAudioStream = null;
      }
      resetDenoiseGraph();

      if (pubSyntheticOscillator) {
        try {
          pubSyntheticOscillator.stop();
        } catch (e) {
          console.warn('Error stopping synthetic oscillator:', e);
        }
        pubSyntheticOscillator = null;
      }

      if (pubSyntheticAudioContext) {
        if (pubSyntheticAudioContext.state !== 'closed') {
          pubSyntheticAudioContext.close();
        }
        pubSyntheticAudioContext = null;
      }

      // Disconnect audio source and close audio context
      if (pubAudioSource) {
        try {
          pubAudioSource.disconnect();
        } catch (e) {
          console.warn('Error disconnecting audio source:', e);
        }
        pubAudioSource = null;
      }

      if (pubAudioContext) {
        if (pubAudioMeter) {
          pubAudioMeter.shutdown();
          pubAudioMeter = null;
        }
        if (pubAudioContext.state !== 'closed') {
          pubAudioContext.close();
        }
        pubAudioContext = null;
        pubRnnoiseWorkletLoaded = false;
      }

      // Clear meter update interval
      if (pubMeterUpdateInterval) {
        clearInterval(pubMeterUpdateInterval);
        pubMeterUpdateInterval = null;
      }

      // Reset UI
      document.getElementById('audioMeterBar').style.width = '0%';
      document.getElementById('startBtn').style.display = 'block';
      document.getElementById('stopBtn').style.display = 'none';
      document.getElementById('audioMeter').style.display = 'none';
      document.getElementById('listenerCount').style.display = 'none';
      document.getElementById('listenerCountValue').textContent = '0';

      if (sfuWs && sfuWs.readyState === WebSocket.OPEN) {
        setStatus('Ready to broadcast', 'connected');
      }
    }

    // Handle page unload
    window.addEventListener('beforeunload', () => {
      destroyTranscriptBinding();
      stopBroadcast(true); // Intentional stop (user leaving page)
      stopMonitorChannel();
    });

    publisherChatWidget = window.SoundcastFloatingChat.create({
      buttonLabel: 'Admin Chat',
      title: 'Admin Chat',
      inputPlaceholder: 'Message admin...',
      emptyMessage: 'No messages yet.',
      onSend: sendPublisherChat,
      renderMessage: (message) => {
        const senderLabel = message.sender === 'admin' ? 'Admin' : 'You';
        return `<div class="chat-row"><strong>${senderLabel}</strong> <small>${formatChatTimestamp(message.timestamp)}</small><br>${escapeHtml(message.text)}</div>`;
      }
    });

    // Initialize
    connectToRoom();
  </script>
</body>
